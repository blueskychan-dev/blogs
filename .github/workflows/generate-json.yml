name: Regenerate blogs.json

on:
  push:
    branches: [main]
    paths:
      - "posts/**"
      - "generate.js"
      - ".github/workflows/generate-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blogs.json
        run: node generate.js

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain blogs.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add blogs.json
            git commit -m "chore: regenerate blogs.json"
            git push
          else
            echo "blogs.json already up to date."
          fi
